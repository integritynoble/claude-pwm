name: Build standalone Claude binaries

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      claude_version:
        description: 'Claude Code version (blank = latest)'
        required: false
        default: ''

jobs:
  build-linux:
    name: Build (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code + pkg
        run: |
          VERSION="${{ github.event.inputs.claude_version }}"
          if [ -z "$VERSION" ]; then
            npm install -g @anthropic-ai/claude-code
          else
            npm install -g @anthropic-ai/claude-code@$VERSION
          fi
          npm install -g @yao-pkg/pkg
          claude --version

      - name: Bundle
        run: |
          CLAUDE_DIR=$(npm root -g)/@anthropic-ai/claude-code
          CLAUDE_ENTRY="$CLAUDE_DIR/bin/claude.exe"
          echo "Entry: $CLAUDE_ENTRY"
          # pkg needs a package.json with bin field; the npm package provides it
          pkg "$CLAUDE_DIR" \
            --targets node20-linux-x64 \
            --output claude-pwm-linux \
            --compress GZip

      - uses: actions/upload-artifact@v4
        with:
          name: claude-pwm-linux
          path: claude-pwm-linux
          retention-days: 30

  build-macos:
    name: Build (macOS arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code + pkg
        run: |
          VERSION="${{ github.event.inputs.claude_version }}"
          if [ -z "$VERSION" ]; then
            npm install -g @anthropic-ai/claude-code
          else
            npm install -g @anthropic-ai/claude-code@$VERSION
          fi
          npm install -g @yao-pkg/pkg
          claude --version

      - name: Bundle
        run: |
          CLAUDE_DIR=$(npm root -g)/@anthropic-ai/claude-code
          echo "Entry dir: $CLAUDE_DIR"
          pkg "$CLAUDE_DIR" \
            --targets node20-macos-arm64 \
            --output claude-pwm-macos \
            --compress GZip

      - uses: actions/upload-artifact@v4
        with:
          name: claude-pwm-macos
          path: claude-pwm-macos
          retention-days: 30

  build-windows:
    name: Build (Windows x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code + pkg
        run: |
          $VERSION = "${{ github.event.inputs.claude_version }}"
          if ($VERSION -eq "") {
            npm install -g @anthropic-ai/claude-code
          } else {
            npm install -g "@anthropic-ai/claude-code@$VERSION"
          }
          npm install -g @yao-pkg/pkg
          claude --version

      - name: Bundle
        run: |
          $CLAUDE_DIR = "$(npm root -g)\@anthropic-ai\claude-code"
          Write-Host "Entry dir: $CLAUDE_DIR"
          pkg "$CLAUDE_DIR" --targets node20-win-x64 --output claude-pwm-windows.exe --compress GZip

      - uses: actions/upload-artifact@v4
        with:
          name: claude-pwm-windows
          path: claude-pwm-windows.exe
          retention-days: 30

  release:
    name: Create release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/download-artifact@v4
        with:
          name: claude-pwm-linux
      - uses: actions/download-artifact@v4
        with:
          name: claude-pwm-macos
      - uses: actions/download-artifact@v4
        with:
          name: claude-pwm-windows

      - name: Get Claude version
        id: ver
        run: echo "claude=$(npm show @anthropic-ai/claude-code version)" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.claude }}
          name: "Claude Code ${{ steps.ver.outputs.claude }} (standalone)"
          body: |
            ## claude-pwm — standalone Claude Code binaries

            Packages `@anthropic-ai/claude-code@${{ steps.ver.outputs.claude }}` with Node.js built-in.
            **No Node.js installation required.**

            ### macOS (Apple Silicon)
            ```bash
            curl -L https://github.com/integritynoble/claude-pwm/releases/latest/download/claude-pwm-macos \
              -o /usr/local/bin/claude-pwm && chmod +x /usr/local/bin/claude-pwm
            xattr -d com.apple.quarantine /usr/local/bin/claude-pwm  # if Gatekeeper blocks
            ```

            ### Linux (x86_64)
            ```bash
            curl -L https://github.com/integritynoble/claude-pwm/releases/latest/download/claude-pwm-linux \
              -o /usr/local/bin/claude-pwm && chmod +x /usr/local/bin/claude-pwm
            ```

            ### Windows (x86_64)
            Download [claude-pwm-windows.exe](https://github.com/integritynoble/claude-pwm/releases/latest/download/claude-pwm-windows.exe) and add to PATH.

            ### Use with PWM exchange
            ```bash
            export ANTHROPIC_BASE_URL=https://physicsworldmodel.org/api/v1/exchange/anthropic
            export ANTHROPIC_AUTH_TOKEN=pwm_your_key_here
            claude-pwm
            ```
          files: |
            claude-pwm-macos
            claude-pwm-linux
            claude-pwm-windows.exe
          draft: false
          prerelease: false
