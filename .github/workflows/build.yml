name: Build standalone Claude binaries

# Claude Code ships fully standalone NATIVE binaries per platform (the
# @anthropic-ai/claude-code-<platform> optionalDependencies). There is nothing
# to bundle — repackage the official binaries under the claude-pwm names at ONE
# pinned version. The previous pipeline pkg-wrapped the native ELF/Mach-O as if
# it were JavaScript (instant SyntaxError crash on linux/macos) and let each OS
# runner resolve "latest" independently (Windows shipped 2.1.197 in the
# v2.1.198 release).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      claude_version:
        description: 'Claude Code version (blank = latest)'
        required: false
        default: ''

jobs:
  repack:
    name: Repackage official native binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve version (single source of truth for ALL platforms)
        id: ver
        run: |
          V="${{ github.event.inputs.claude_version }}"
          if [ -z "$V" ]; then
            V=$(npm show @anthropic-ai/claude-code version)
          fi
          echo "claude=$V" >> "$GITHUB_OUTPUT"
          echo "Building claude-pwm for Claude Code $V"

      - name: Extract official binaries
        run: |
          set -euo pipefail
          V="${{ steps.ver.outputs.claude }}"
          repack() {  # repack <platform-suffix> <output-name>
            npm pack "@anthropic-ai/claude-code-$1@$V" --silent
            rm -rf x && mkdir x
            tar xzf "anthropic-ai-claude-code-$1-$V.tgz" -C x
            mv x/package/claude* "$2"
          }
          repack linux-x64    claude-pwm-linux
          repack darwin-arm64 claude-pwm-macos
          repack win32-x64    claude-pwm-windows.exe
          chmod +x claude-pwm-linux claude-pwm-macos
          ls -la claude-pwm-*

      - name: Smoke test (the old pipeline shipped binaries that crashed on startup)
        run: |
          ./claude-pwm-linux --version
          # PE sanity for the Windows exe: MZ magic present
          head -c2 claude-pwm-windows.exe | grep -q MZ

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.claude }}
          name: "Claude Code ${{ steps.ver.outputs.claude }} (standalone)"
          body: |
            ## claude-pwm — standalone Claude Code binaries

            The official native `@anthropic-ai/claude-code@${{ steps.ver.outputs.claude }}`
            binaries, repackaged under one name. **No Node.js required.**

            ### macOS (Apple Silicon)
            ```bash
            curl -L https://github.com/integritynoble/claude-pwm/releases/latest/download/claude-pwm-macos \
              -o /usr/local/bin/claude-pwm && chmod +x /usr/local/bin/claude-pwm
            xattr -d com.apple.quarantine /usr/local/bin/claude-pwm  # if Gatekeeper blocks
            ```

            ### Linux (x86_64)
            ```bash
            curl -L https://github.com/integritynoble/claude-pwm/releases/latest/download/claude-pwm-linux \
              -o /usr/local/bin/claude-pwm && chmod +x /usr/local/bin/claude-pwm
            ```

            ### Windows (x86_64)
            Download [claude-pwm-windows.exe](https://github.com/integritynoble/claude-pwm/releases/latest/download/claude-pwm-windows.exe) and add to PATH.

            ### Use with PWM exchange
            ```bash
            export ANTHROPIC_BASE_URL=https://physicsworldmodel.org/api/v1/exchange/anthropic
            export ANTHROPIC_AUTH_TOKEN=sk-pwm-your_key_here
            claude-pwm
            ```
          files: |
            claude-pwm-macos
            claude-pwm-linux
            claude-pwm-windows.exe
          draft: false
          prerelease: false
